<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Staff Management - MNRFoodBill</title>
    <!-- Favicon -->
    <link rel="icon" href="icons/icon-192x192.png" type="image/png">
    <!-- iOS PWA Icons -->
    <link rel="apple-touch-icon" href="ios/180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="ios/152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="ios/167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="ios/180.png">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ef4444">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MNRFoodBill">
    
    <!-- External CSS -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://www.gstatic.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js" defer></script>

    <!-- Application Scripts -->
    <script src="firebase-config.js" defer></script>
    <script src="js/layout.js" defer></script>
    <script src="js/staff.js" defer></script>
    <script src="js/table-responsive.js" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative w-32 h-32 mb-8">
            <div class="absolute inset-0 border-4 border-gray-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-red-500 border-t-transparent rounded-full premium-loader-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="bg-white p-3 rounded-full shadow-sm premium-pulse">
                    <i class="fas fa-utensils text-3xl text-red-500"></i>
                </div>
            </div>
            <div class="absolute top-0 right-0 transform translate-x-1/4 -translate-y-1/4 premium-float" style="animation-delay: 0s;">
                <div class="bg-white p-2 rounded-lg shadow-md border border-gray-100">
                    <i class="fas fa-file-invoice-dollar text-yellow-500 text-lg"></i>
                </div>
            </div>
            <div class="absolute bottom-0 left-0 transform -translate-x-1/4 translate-y-1/4 premium-float" style="animation-delay: 1.5s;">
                <div class="bg-white p-2 rounded-lg shadow-md border border-gray-100">
                    <i class="fas fa-concierge-bell text-gray-700 text-lg"></i>
                </div>
            </div>
        </div>
        <div class="text-center space-y-2">
            <h2 class="text-2xl font-bold text-gray-800 tracking-widest uppercase">MNR<span class="text-red-500">FoodBill</span></h2>
            <div class="flex items-center justify-center space-x-2 text-gray-400 text-sm">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-bounce" style="animation-delay: 0s"></span>
                <span class="w-2 h-2 bg-red-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                <span class="w-2 h-2 bg-red-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
            </div>
            <p class="text-gray-400 text-xs font-medium tracking-wide uppercase mt-2">Premium Restaurant POS</p>
        </div>
    </div>

    <div id="header"></div>

    <div class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div id="sidebar" class="hidden lg:block lg:col-span-1"></div>

            <div class="lg:col-span-3">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Staff Management</h1>
                        <p class="text-gray-500 text-sm">Add staff members and manage their access levels</p>
                    </div>
                    <button id="addStaffBtn" class="bg-red-500 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-600 transition shadow-md">
                        <i class="fas fa-user-plus mr-2"></i> Add Staff
                    </button>
                </div>

                <!-- Staff List -->
                <div class="bg-white rounded-xl shadow border border-gray-100 overflow-hidden p-4">
                    <div class="table-container">
                        <div class="table-wrapper">
                            <div class="scroll-indicator">→</div>
                            <table class="w-full">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="py-4 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Staff Info</th>
                                        <th class="py-4 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                                        <th class="py-4 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Permissions</th>
                                        <th class="py-4 px-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="staffTable" class="divide-y divide-gray-100">
                                    <!-- Staff rows will be injected here -->
                                    <tr>
                                        <td colspan="4" class="py-10 text-center text-gray-500">
                                            <div class="flex flex-col items-center">
                                                <i class="fas fa-users text-4xl mb-3 opacity-20"></i>
                                                <p>Loading staff data...</p>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Staff Modal -->
    <div id="staffModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-modal-up">
            <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-800" id="staffModalTitle">Add New Staff</h3>
                <button onclick="closeStaffModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            
            <form id="staffForm" class="p-6 space-y-4">
                <div class="space-y-1">
                    <label class="block text-sm font-semibold text-gray-700">Full Name</label>
                    <input type="text" id="staffName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="Enter staff name">
                </div>
                
                <div class="space-y-1">
                    <label class="block text-sm font-semibold text-gray-700">Email Address</label>
                    <input type="email" id="staffEmail" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="staff@example.com">
                </div>

                <div id="passwordField" class="space-y-1">
                    <label class="block text-sm font-semibold text-gray-700">Login Password</label>
                    <input type="password" id="staffPassword" minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="Minimum 6 characters">
                    <p class="text-[10px] text-gray-400">Share this password with the staff member for their first login.</p>
                </div>

                <div class="pt-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">Module Permissions</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" name="permission" value="billing" checked class="w-4 h-4 text-red-500 rounded focus:ring-red-500">
                            <span class="ml-2 text-sm text-gray-700">Billing</span>
                        </label>
                        <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" name="permission" value="orders" checked class="w-4 h-4 text-red-500 rounded focus:ring-red-500">
                            <span class="ml-2 text-sm text-gray-700">Orders</span>
                        </label>
                        <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" name="permission" value="products" class="w-4 h-4 text-red-500 rounded focus:ring-red-500">
                            <span class="ml-2 text-sm text-gray-700">Products</span>
                        </label>
                        <label class="flex items-center p-2 border rounded-lg hover:bg-gray-50 cursor-pointer">
                            <input type="checkbox" name="permission" value="settings" class="w-4 h-4 text-red-500 rounded focus:ring-red-500">
                            <span class="ml-2 text-sm text-gray-700">Settings</span>
                        </label>
                    </div>
                </div>

                <div class="flex space-x-3 pt-6">
                    <button type="submit" id="saveStaffBtn" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition flex items-center justify-center">
                        <i class="fas fa-save mr-2"></i> Save Staff
                    </button>
                    <button type="button" onclick="closeStaffModal()" class="flex-1 border border-gray-300 py-3 rounded-xl font-bold hover:bg-gray-50 transition">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Service Worker and Initialization -->
    <script>
        (function() {
            function hideOverlay() {
                var overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.style.display = 'none';
            }
            window.addEventListener('load', function() { setTimeout(hideOverlay, 600); });
            setTimeout(hideOverlay, 4000);
        })();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(function(reg) { console.log('[SW] Registered, scope:', reg.scope); })
                .catch(function(err) { console.error('[SW] Registration failed:', err); });
        }
    </script>
</body>
</html>
